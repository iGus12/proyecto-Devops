name: Deploy Despachos

on:
  push:
    branches:
      - deploy
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          file: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en AWS EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Bajar la nueva imagen de Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest
            
            # 2. Detener y borrar el contenedor viejo si es que ya estaba corriendo
            docker stop back-despachos-container || true
            docker rm back-despachos-container || true
            
            # 3. Lanzar el nuevo contenedor en el puerto local de AWS (8081 mapeado al 8080 interno)
            docker run -d \
              --name back-despachos-container \
              -p 8081:8080 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest